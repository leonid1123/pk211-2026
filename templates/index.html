<!DOCTYPE html>
<html>
<head>
    <title>Вход в систему</title>
    <link rel="stylesheet" href="static/w3.css">
</head>
<body class="w3-container">
<h2>Добро пожаловать в систему учета</h2>
    <form method="POST">
        <input class="w3-input" type="text" name="login" placeholder="Введите логин">
        <input class="w3-input" type="password" name="password" placeholder="Введите пароль">
        <input class="w3-input" type="submit" name="user_login" value="Вход">
        <input class="w3-input" type="submit" name="guest_login" value="Гостевой вход">
    </form>
</body>
</html>
