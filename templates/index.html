<!DOCTYPE html>
<html>
<head>
    <title>Футболки</title>
    <link rel="stylesheet" href="static/w3.css">
</head>
<body class="w3-container">
<form method="post" enctype="multipart/form-data">
    <label>Цвет</label>
    <input class="w3-input" type="text" name="inp_color">
    <label>Размер</label>
    <input class="w3-input" type="number" name="inp_size">
    <label>Материал</label>
    <input class="w3-input" type="text" name="inp_material">
    <label>Изображение</label>
    <input class="w3-input" type="file" name="inp_img">
    <input class="w3-input" type="submit" value="Добавить футболку">
</form>
<p>{{msg}}</p>
</body>
</html>
